<!DOCTYPE html>
<html>
<head>
    <title>CSS Boxes</title>

    <style>
        .box {
            width: 350px;
            height: 120px;
            border: 4px solid black;
            margin: 20px;
            padding: 20px;
            font-size: 22px;
        }

        .green {
            background-color: green;
        }

        .pink {
            background-color: hotpink;
        }

        .blue {
            background-color: #2f5378;
        }
    </style>
</head>
<body>

<div class="box green">Some text.</div>
<div class="box pink">Some more text.</div>
<div class="box blue">Even more text.</div>

</body>
</html>
