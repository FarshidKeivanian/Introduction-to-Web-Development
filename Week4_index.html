<!DOCTYPE html>
<html>
<head>
    <title>Create an Account</title>
</head>
<body>

    <h1>Create an Account</h1>

    <form>
        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Password:</label><br>
        <input type="password"><br><br>

        <label>Age:</label><br>
        <select>
            <option>Select Age</option>
            <option>18-25</option>
            <option>26-35</option>
            <option>36-45</option>
            <option>46+</option>
        </select><br><br>

        <label>Tell us a little about yourself:</label><br>
        <textarea rows="5" cols="40"></textarea><br><br>

        <input type="checkbox"> I agree to the <a href="#">terms of service</a><br><br>

        <input type="submit" value="Sign up">
    </form>

</body>
</html>
